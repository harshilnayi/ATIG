services:
  postgres:
    image: postgres:15-alpine
    container_name: atig-postgres
    environment:
      POSTGRES_USER: atig
      POSTGRES_PASSWORD: atig_dev_pass_2026
      POSTGRES_DB: atig_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atig"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
